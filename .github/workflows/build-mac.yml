name: Build macOS App

on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS app
        run: npm run dist:mac

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: CashSheet-mac
          path: release/*.zip
