name: Build macOS App

on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build-mac:
    strategy:
      matrix:
        include:
          - runner: macos-13
            arch: x64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Compile app (renderer + main)
        run: npm run build

      - name: Build macOS app (${{ matrix.arch }})
        run: npx electron-builder --mac --${{ matrix.arch }}

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: CashSheet-mac-${{ matrix.arch }}
          path: release/*.zip
